<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantCare Tracker · Pflanze hinzufügen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Open+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="add-plant">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html">🌿 PlantCare Tracker</a>
        <button class="menu-toggle" id="menuToggle" aria-label="Navigation öffnen">☰</button>
        <nav class="main-nav" id="mainNav">
          <a href="add-plant.html">Pflanze hinzufügen</a>
          <a href="diagnose.html">Diagnose</a>
          <a href="history.html">Pflegehistorie</a>
          <a href="settings.html">Einstellungen</a>
          <a href="community.html">Community</a>
        </nav>
      </div>
    </header>

    <main class="container page fade-up">
      <section class="panel form-panel">
        <h1>Neue Pflanze erfassen</h1>
        <form class="plant-form">
          <label>
            Name der Pflanze
            <input type="text" placeholder="z. B. Monstera Deliciosa" />
          </label>
          <label>
            Standort
            <input type="text" placeholder="Wohnzimmer, Ostfenster" />
          </label>
          <label>
            Letzter Gießtag
            <input type="date" />
          </label>
          <label>
            Notizen
            <textarea rows="5" placeholder="Spezielle Pflegehinweise..."></textarea>
          </label>
          <button type="submit" class="btn">Pflanze speichern</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
